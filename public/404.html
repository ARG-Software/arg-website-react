<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Page Not Found | ARG Software</title>

      name="description"
      content="The page you're looking for doesn't exist. Head back to ARG Software's homepage."
    />

    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="shortcut icon" href="/favicon.ico" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="ARG Software" />
    <meta property="og:title" content="Page Not Found | ARG Software" />
    <meta property="og:url" content="https://arg.software/404" />
    <meta property="og:image" content="https://arg.software/images/og.jpg" />
   <style>
      @font-face {
        font-family: 'Neuemontreal';
        src: url('/fonts/neuemontreal-medium.woff') format('woff');
        font-weight: 500;
        font-style: normal;
        font-display: swap;
      }
      @font-face {
        font-family: 'Neuemontreal';
        src: url('/fonts/neuemontreal-regular.woff') format('woff');
        font-weight: 400;
        font-style: normal;
        font-display: swap;
      }

      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --black: #1a1a1a;
        --white: #f6f6f7;
        --gray: #ededed;
        --mid-gray: #888;
        --gradient: linear-gradient(90deg, #f0060d, #c924d7, #7904fd);
        --nav-bg: linear-gradient(135deg, #5a1070 0%, #2e0175 100%);
        --font: 'Neuemontreal', Arial, sans-serif;
        --ease: cubic-bezier(0.16, 1, 0.3, 1);
      }

      html {
        -webkit-font-smoothing: antialiased;
        text-rendering: optimizeLegibility;
      }

      body {
        font-family: var(--font);
        background: #fff;
        color: var(--black);
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        overflow-x: hidden;
      }

      a {
        color: inherit;
        text-decoration: none;
      }

      /* ── MAIN ─────────────────────────────────────────────── */

      .logo {
        display: block;
        width: 56px;
        color: var(--black);
        margin: 0 auto 2.5rem;
      }

      .main {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 5rem 2.5rem 5rem;
        position: relative;
        overflow: hidden;
      }

      /* Faint background ghost number */
      .ghost {
        position: absolute;
        font-size: clamp(18rem, 38vw, 32rem);
        font-weight: 500;
        line-height: 1;
        letter-spacing: -0.04em;
        color: var(--gray);
        user-select: none;
        pointer-events: none;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        white-space: nowrap;
        z-index: 0;
      }

      .content {
        position: relative;
        z-index: 1;
        text-align: center;
        max-width: 560px;
      }

      /* Error tag */
      .tag {
        display: inline-block;
        font-size: 0.6875rem;
        font-weight: 500;
        text-transform: uppercase;
        letter-spacing: 0.16em;
        color: var(--mid-gray);
        border: 1px solid #ddd;
        border-radius: 100px;
        padding: 0.45rem 1.1rem;
        margin-bottom: 1.75rem;
      }

      /* Gradient "404" */
      .code {
        font-size: clamp(5.5rem, 18vw, 11rem);
        font-weight: 500;
        line-height: 1;
        letter-spacing: -0.04em;
        background: var(--gradient);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        margin-bottom: 1.25rem;
      }

      .heading {
        font-size: clamp(1.625rem, 4vw, 2.625rem);
        font-weight: 500;
        letter-spacing: -0.025em;
        line-height: 1.15;
        color: var(--black);
        margin-bottom: 1.25rem;
      }

      .sub {
        font-size: 1rem;
        font-weight: 400;
        color: var(--mid-gray);
        line-height: 1.75;
        margin-bottom: 2.75rem;
        max-width: 400px;
        margin-left: auto;
        margin-right: auto;
      }

      /* CTA buttons */
      .actions {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0.875rem;
        flex-wrap: wrap;
      }

      .btn-primary {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        background: var(--black);
        color: #fff;
        font-family: var(--font);
        font-size: 0.9375rem;
        font-weight: 500;
        padding: 0.875rem 2rem;
        border-radius: 100px;
        transition:
          transform 0.25s var(--ease),
          box-shadow 0.25s;
      }

      .btn-primary:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.18);
      }

      .btn-primary svg {
        width: 15px;
        height: 15px;
      }

      .btn-outline {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        color: var(--mid-gray);
        font-family: var(--font);
        font-size: 0.9375rem;
        font-weight: 400;
        padding: 0.875rem 1.75rem;
        border: 1px solid #ddd;
        border-radius: 100px;
        transition:
          border-color 0.25s,
          color 0.25s;
      }

      .btn-outline:hover {
        border-color: #aaa;
        color: var(--black);
      }

      /* ── FOOTER ───────────────────────────────────────────── */

      .footer {
        border-top: 1px solid var(--gray);
        padding: 1.5rem 2.5rem;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 1rem;
        font-size: 0.8125rem;
        color: #bbb;
      }

      .footer-links {
        display: flex;
        gap: 1.5rem;
        list-style: none;
      }

      .footer-links a {
        color: #bbb;
        transition: color 0.2s;
      }
      .footer-links a:hover {
        color: var(--black);
      }

      /* ── PAGE TRANSITION OVERLAY ─────────────────────────── */

      .pt-overlay {
        position: fixed;
        inset: 0;
        pointer-events: none;
        background: #0c002e;
        opacity: 0;
        transition: opacity 380ms cubic-bezier(0.16, 1, 0.3, 1);
        z-index: 999999;
      }

      .pt-overlay.covering {
        opacity: 1;
      }

      /* ── ANIMATIONS ───────────────────────────────────────── */

      @keyframes fadeUp {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .logo {
        animation: fadeUp 0.7s var(--ease) 0.05s both;
      }
      .tag {
        animation: fadeUp 0.7s var(--ease) 0.13s both;
      }
      .code {
        animation: fadeUp 0.7s var(--ease) 0.21s both;
      }
      .heading {
        animation: fadeUp 0.7s var(--ease) 0.29s both;
      }
      .sub {
        animation: fadeUp 0.7s var(--ease) 0.37s both;
      }
      .actions {
        animation: fadeUp 0.7s var(--ease) 0.45s both;
      }

      /* ── RESPONSIVE ───────────────────────────────────────── */

      @media (max-width: 767px) {
        .main {
          padding: 3rem 1.25rem 3rem;
        }
        .footer {
          padding: 1.25rem 1.25rem;
          flex-direction: column;
          text-align: center;
        }
      }

      @media (max-width: 479px) {
        .ghost {
          display: none;
        }
        .actions {
          flex-direction: column;
          align-items: stretch;
        }
        .btn-primary,
        .btn-outline {
          justify-content: center;
        }
      }
    </style>
  </head>
  <body>

              <linearGradient

        </a>
        <span class="tag">Error 404</span>
        <div class="code" aria-hidden="true">404</div>
        <h1 class="heading">Page not found</h1>
        <p class="sub">
          The page you're looking for has moved, been deleted, or never existed. Let's get you back
          on track.
        </p>
        <div class="actions">
          <a href="/" class="btn-primary t-link">
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z" />
              <polyline points="9 22 9 12 15 12 15 22" />
            </svg>
            Go to homepage
          </a>
          <a
            href="https://zcal.co/argsoftware/project"
            target="_blank"
            rel="noopener noreferrer"
            class="btn-outline"
            >Book a meeting</a
          >
        </div>
      </div>
    </main>

    <!-- PAGE TRANSITION OVERLAY -->
    <div class="pt-overlay" id="pt-overlay" aria-hidden="true"></div>

    <!-- FOOTER -->
    <footer class="footer">
      <span>© 2025 ARG Software</span>
      <ul class="footer-links" aria-label="Footer links">
        <li><a href="/">Home</a></li>
        <li><a href="/articles">Articles</a></li>
        <li><a href="/clients">Clients</a></li>
        <li><a href="/partners">Partners</a></li>
        <li><a href="mailto:hello@arg.software">Contact</a></li>
      </ul>
    </footer>

    <script>
      var overlay = document.getElementById('pt-overlay');
      var DURATION = 380;

      document.querySelectorAll('a.t-link').forEach(function (link) {
        link.addEventListener('click', function (e) {
          var href = link.getAttribute('href');
          if (!href || href.startsWith('mailto:') || href.startsWith('http')) return;
          e.preventDefault();
          overlay.classList.add('covering');
          setTimeout(function () {
            window.location.href = href;
          }, DURATION);
        });
      });
    </script>
